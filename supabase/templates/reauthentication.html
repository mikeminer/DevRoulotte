<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codice verifica DevRoulotte</title>
  </head>
  <body style="margin:0;background:#080b10;color:#f7fbff;font-family:Inter,Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#080b10;margin:0;padding:28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#0d121a;border:1px solid #243044;border-radius:14px;overflow:hidden;">
            <tr>
              <td align="center" style="padding:28px;">
                <img src="https://devroulotte.chat/devroulotte-email-logo.png" width="96" height="96" alt="DevRoulotte" style="display:block;border-radius:18px;">
                <h1 style="margin:18px 0 8px;color:#ffffff;font-size:26px;line-height:1.2;font-weight:800;">Codice di verifica</h1>
                <p style="margin:0;color:#dbe7f3;font-size:15px;line-height:1.7;">Usa questo codice per confermare l'operazione sensibile:</p>
                <p style="margin:24px 0;color:#ffffff;font-size:32px;letter-spacing:7px;font-weight:900;">{{ .Token }}</p>
                <p style="margin:0;color:#9aa7b7;font-size:12px;line-height:1.6;">Se non hai richiesto tu questa verifica, ignora questa email.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
